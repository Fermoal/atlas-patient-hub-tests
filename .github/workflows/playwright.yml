name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - appointments
          - billing
          - profile

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create credentials file
        run: |
          mkdir -p tests/fixtures
          cat > tests/fixtures/credentials.ts << EOF
          export const TEST_USER = {
            email: '${{ secrets.TEST_EMAIL }}',
            password: '${{ secrets.TEST_PASSWORD }}',
          };
          export const BASE_URL = 'https://atlas.atlasdevel5.com';
          EOF

      - name: Run all tests
        if: ${{ github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == '' }}
        run: npx playwright test

      - name: Run auth tests
        if: ${{ github.event.inputs.test_suite == 'auth' }}
        run: npx playwright test tests/login.spec.ts

      - name: Run appointments tests
        if: ${{ github.event.inputs.test_suite == 'appointments' }}
        run: npx playwright test tests/appointments.spec.ts

      - name: Run billing tests
        if: ${{ github.event.inputs.test_suite == 'billing' }}
        run: npx playwright test tests/billing.spec.ts

      - name: Run profile tests
        if: ${{ github.event.inputs.test_suite == 'profile' }}
        run: npx playwright test tests/profile.spec.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30